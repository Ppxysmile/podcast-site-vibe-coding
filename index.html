<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PodWave - Your Personal Podcast App</title>
    <meta name="description" content="A beautiful podcast player for daily listening - morning and night">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="#" class="logo">
                <span class="logo-icon">🎧</span>
                <span class="logo-text">PodWave</span>
            </a>
            <nav class="header-nav">
                <a href="#" class="nav-link active" data-view="discover">Discover</a>
                <a href="#" class="nav-link" data-view="library">Library</a>
                <a href="#" class="nav-link" data-view="history">History</a>
            </nav>
            <div class="header-actions">

                <button class="icon-btn" id="darkModeToggle" title="Dark Mode">🌙</button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="heroSection">
        <h1 class="hero-title">
            <span class="gradient-text">随时随地</span> 自由聆听
        </h1>
        <p class="hero-subtitle">
            发现海量播客，即刻播放，无限可能
        </p>
        <div class="hero-actions">
            <button class="btn btn-primary" onclick="document.getElementById('searchInput').focus()">
                🔍 搜索播客
            </button>
            <button class="btn btn-secondary" onclick="showAddRssModal()">
                ➕ 添加 RSS
            </button>
        </div>
    </section>

    <!-- Categories Section -->
    <section class="categories" id="categoriesSection">
        <div class="section-header">
            <div>
                <h2 class="section-title" id="sectionTitle">精选播客</h2>
                <p class="section-subtitle" id="sectionSubtitle">为你精选</p>
            </div>
        </div>
        <div class="category-grid" id="categoryGrid">
            <div class="category-card active" data-category="all">
                <span class="category-icon">✨</span>
                <span class="category-name">全部</span>
            </div>
            <div class="category-card" data-category="科技">
                <span class="category-icon">🚀</span>
                <span class="category-name">科技</span>
            </div>
            <div class="category-card" data-category="新闻">
                <span class="category-icon">📰</span>
                <span class="category-name">新闻</span>
            </div>
            <div class="category-card" data-category="财经">
                <span class="category-icon">💰</span>
                <span class="category-name">财经</span>
            </div>
            <div class="category-card" data-category="心理">
                <span class="category-icon">🧠</span>
                <span class="category-name">心理</span>
            </div>
            <div class="category-card" data-category="励志">
                <span class="category-icon">💪</span>
                <span class="category-name">励志</span>
            </div>
            <div class="category-card" data-category="治愈">
                <span class="category-icon">💚</span>
                <span class="category-name">治愈</span>
            </div>
            <div class="category-card" id="refreshCard" onclick="refreshAllPodcasts()" title="刷新获取最新内容">
                <span class="category-icon">🔄</span>
                <span class="category-name">刷新</span>
            </div>
        </div>
    </section>

    <!-- Search Section -->
    <section class="podcast-section">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索播客名称、主题或关键词...">
        </div>
        <div class="search-results" id="searchResults"></div>
    </section>

    <!-- Podcast Grid Section -->
    <section class="podcast-section" id="podcastSection">
        <div class="podcast-grid" id="podcastGrid">
            <!-- Podcasts will be loaded here -->
        </div>
    </section>

    <!-- Library Section (hidden by default) -->
    <section class="podcast-section" id="librarySection" style="display: none;">
        <div class="section-header">
            <div>
                <h2 class="section-title" id="libraryTitle">我的收藏</h2>
                <p class="section-subtitle" id="librarySubtitle">你喜欢的播客</p>
            </div>
        </div>
        <div class="podcast-grid" id="libraryGrid"></div>
        <div class="empty-state" id="libraryEmpty" style="display: none;">
            <div class="empty-icon">💜</div>
            <h3 class="empty-title" id="libraryEmptyTitle">暂无收藏</h3>
            <p id="libraryEmptyText">开始探索，添加你喜欢的播客</p>
        </div>
    </section>

    <!-- History Section (hidden by default) -->
    <section class="podcast-section" id="historySection" style="display: none;">
        <div class="section-header">
            <div>
                <h2 class="section-title" id="historyTitle">最近播放</h2>
                <p class="section-subtitle" id="historySubtitle">继续收听上次的内容</p>
            </div>
            <button class="btn btn-secondary" id="clearHistoryBtn">清除全部</button>
        </div>
        <div class="episode-list" id="historyList"></div>
        <div class="empty-state" id="historyEmpty" style="display: none;">
            <div class="empty-icon">📻</div>
            <h3 class="empty-title" id="historyEmptyTitle">暂无历史记录</h3>
            <p id="historyEmptyText">开始收听，建立你的历史记录</p>
        </div>
    </section>

    <!-- Floating Player Bar -->
    <div class="floating-player" id="floatingPlayer" style="display: none;">
        <div class="floating-player-content">
            <div class="floating-info">
                <div class="floating-cover" id="floatingCover">🎧</div>
                <div class="floating-text">
                    <div class="floating-title" id="floatingTitle">未播放</div>
                    <div class="floating-time" id="floatingTime">0:00 / 0:00</div>
                </div>
            </div>
            <div class="floating-controls">
                <button class="floating-btn" id="floatingPrev" onclick="playPrevious()">⏮️</button>
                <button class="floating-btn floating-play" id="floatingPlayPause" onclick="togglePlayPause()">▶️</button>
                <button class="floating-btn" id="floatingNext" onclick="playNext()">⏭️</button>
            </div>
        </div>
        <div class="floating-progress" onclick="seekFloatingAudio(event)">
            <div class="floating-progress-bar" id="floatingProgressBar">
                <div class="floating-progress-fill" id="floatingProgressFill"></div>
            </div>
        </div>
    </div>

    <!-- Timer Modal -->
    <!-- Timer Modal -->
    <div class="modal-overlay" id="timerModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="sleepTimerTitle">睡眠定时</h3>
                <button class="modal-close" onclick="closeTimerModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="timer-options">
                    <button class="timer-option" data-minutes="15">15 分钟</button>
                    <button class="timer-option" data-minutes="30">30 分钟</button>
                    <button class="timer-option" data-minutes="45">45 分钟</button>
                    <button class="timer-option" data-minutes="60">1 小时</button>
                    <button class="timer-option" data-minutes="90">1.5 小时</button>
                    <button class="timer-option" data-minutes="0">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add RSS Modal -->
    <div class="modal-overlay" id="addRssModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">添加自定义 RSS</h3>
                <button class="modal-close" onclick="closeAddRssModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="add-form">
                    <div class="form-group">
                        <label class="form-label">RSS 订阅地址</label>
                        <input type="text" class="form-input" id="rssUrlInput" placeholder="https://example.com/podcast.xml">
                        <p class="help-text">输入任意播客的 RSS 订阅地址</p>
                    </div>
                    <div class="form-group">
                        <label class="form-label">分类</label>
                        <select class="form-select" id="rssCategoryInput">
                            <option value="科技">🚀 科技</option>
                            <option value="新闻">📰 新闻</option>
                            <option value="财经">💰 财经</option>
                            <option value="心理">🧠 心理</option>
                            <option value="励志">💪 励志</option>
                            <option value="治愈">💚 治愈</option>
                            <option value="其他">📻 其他</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" id="addRssBtn" style="width: 100%;">添加播客</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Podcast Detail Modal -->
    <div class="modal-overlay" id="podcastDetailModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="detailPodcastTitle">播客详情</h3>
                <button class="modal-close" onclick="closePodcastDetailModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="tabs">
                    <button class="tab active" data-tab="episodes" onclick="switchDetailTab('episodes')">节目列表</button>
                    <button class="tab" data-tab="about" onclick="switchDetailTab('about')">简介</button>
                </div>
                <div class="episode-list" id="episodeList"></div>
                <div class="about-content" id="aboutContent" style="display: none;">
                    <div class="about-podcast" id="aboutPodcast"></div>
                </div>
                <div class="loading" id="episodeLoading">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container">
        <div class="toast" id="toast"></div>
    </div>

    <!-- Floating Player Bar -->
    <div class="floating-player" id="floatingPlayer" style="display: none;">
        <div class="floating-player-content">
            <div class="floating-info">
                <div class="floating-cover" id="floatingCover">🎧</div>
                <div class="floating-text">
                    <div class="floating-title" id="floatingTitle">未播放</div>
                    <div class="floating-time" id="floatingTime">0:00 / 0:00</div>
                </div>
            </div>
            <div class="floating-controls">
                <button class="floating-btn" onclick="playPrevious()">⏮️</button>
                <button class="floating-btn floating-play" id="floatingPlayPause" onclick="togglePlayPause()">▶️</button>
                <button class="floating-btn" onclick="playNext()">⏭️</button>
            </div>
        </div>
        <div class="floating-progress" id="floatingProgress">
            <div class="floating-progress-bar" id="floatingProgressBar" style="height: 100%; position: relative;">
                <div class="floating-progress-fill" id="floatingProgressFill" style="height: 100%; background: var(--apple-blue); width: 0%;"></div>
            </div>
        </div>
    </div>

    <!-- Add Podcast FAB -->
    <button class="add-podcast-btn" onclick="showAddRssModal()" title="Add Podcast">+</button>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
